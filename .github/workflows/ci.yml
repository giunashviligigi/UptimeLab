# CI — Continuous Integration
# Runs on pull requests (and when CD calls this workflow).
# Verifies backend, frontend, and Docker images build.

name: CI

on:
  pull_request:
    branches: [main, master]
  workflow_call:

jobs:
  backend:
    name: Backend (.NET)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore & build
        working-directory: backend
        run: |
          dotnet restore
          dotnet build -c Release --no-restore

  frontend:
    name: Frontend (Next.js)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install & build
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_URL: http://localhost:5001
        run: |
          npm ci
          npm run build

  docker:
    name: Docker images
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4

      - name: Build images (smoke test)
        run: |
          # Retry — Docker Hub / registry pulls often timeout on GitHub runners
          for attempt in 1 2 3; do
            echo "docker compose build — attempt $attempt/3"
            if docker compose build; then
              exit 0
            fi
            sleep 20
          done
          exit 1
