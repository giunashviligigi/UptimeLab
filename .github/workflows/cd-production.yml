# CD Production — runs when code lands on main (company production branch)
# Optional: add GitHub Environment "production" with required reviewers for approval gate.

name: CD Production

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  # GHCR requires lowercase paths (repo "UptimeLab" → use explicit lowercase names)
  BACKEND_IMAGE: ghcr.io/${{ github.repository_owner }}/uptimelab-backend
  FRONTEND_IMAGE: ghcr.io/${{ github.repository_owner }}/uptimelab-frontend

jobs:
  ci:
    name: Run CI
    uses: ./.github/workflows/ci.yml

  publish-production:
    name: Push production images
    runs-on: ubuntu-latest
    needs: [ci]
    environment: production
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Backend image (production)
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:latest
            ${{ env.BACKEND_IMAGE }}:${{ github.sha }}

      - name: Frontend image (production)
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          build-args: |
            NEXT_PUBLIC_API_URL=${{ vars.PRODUCTION_API_URL || vars.NEXT_PUBLIC_API_URL || 'http://localhost:5010' }}
          tags: |
            ${{ env.FRONTEND_IMAGE }}:latest
            ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}

