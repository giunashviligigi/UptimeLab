# APM Server — receives traces from UptimeLab .NET API, stores in Elasticsearch
apm-server:
  host: "0.0.0.0:8200"

output.elasticsearch:
  hosts: ["http://elasticsearch:9200"]
  protocol: "http"

setup.kibana:
  host: "http://kibana:5601"
  protocol: "http"

setup.template.enabled: true
setup.template.overwrite: false
