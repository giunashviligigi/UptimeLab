# Reverse proxy example — enable nginx service in docker-compose.yml
upstream uptimelab_frontend {
    server frontend:3000;
}

upstream uptimelab_backend {
    server backend:8080;
}

server {
    listen 80;
    server_name localhost;

    location / {
        proxy_pass http://uptimelab_frontend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    location /api/ {
        proxy_pass http://uptimelab_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /health {
        proxy_pass http://uptimelab_backend/health;
    }

    # Prometheus metrics from backend
    location /metrics {
        proxy_pass http://uptimelab_backend/metrics;
    }
}
